<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Optimización de Red Logística</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/black.css" />

    <style>
        html,
        body,
        .reveal {
            height: 100vh !important;
        }

        :root {
            --bg: #0a0e27;
            --bg-2: #0f1436;
            --card: rgba(51, 65, 85, 0.15);
            --card-2: rgba(51, 65, 85, 0.2);
            --accent: #3b82f6; /* Blue-500 */
            --accent-2: #1e40af; /* Blue-800 */
            --accent-light: #60a5fa; /* Blue-400 */
            --secondary: #a78bfa; /* Violet-400 */
            --tertiary: #34d399; /* Emerald-400 */
            --text: #e2e8f0; /* Slate-200 */
            --muted: #94a3b8; /* Slate-400 */
            --success: #10b981;
        }

        .reveal {
            font-family: "Inter", "Segoe UI", sans-serif;
            color: var(--text);
            font-size: 32px; /* Base font size */
        }

        .reveal .slides section {
            text-align: left;
            background:
                radial-gradient(circle at 85% 15%, rgba(59, 130, 246, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 95% 85%, rgba(30, 64, 175, 0.08) 0%, transparent 50%),
                linear-gradient(135deg, var(--bg) 0%, var(--bg-2) 100%);
            padding: 40px 80px; /* Reduced vertical padding */
            box-sizing: border-box;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly; /* Distribute content evenly */
        }

        /* Utility Classes */
        .flex-center {
            display: flex !important;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .text-center {
            text-align: center !important;
        }

        .w-full {
            width: 100%;
        }

        /* Typography Hierarchy */
        h1,
        h2,
        h3 {
            text-transform: none !important;
            letter-spacing: -0.02em;
            margin-bottom: 0.4em !important;
            font-weight: 700;
            color: #f1f5f9;
            line-height: 1.1;
        }

        h1 { font-size: 2.8em !important; }
        h2 { font-size: 2.2em !important; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        h3 { font-size: 1.5em !important; color: var(--accent-light); }

        .eyebrow {
            color: var(--muted);
            font-size: 0.55em;
            margin-bottom: 1.2em;
            opacity: 0.9;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border-left: 3px solid var(--accent);
            padding-left: 12px;
            display: inline-block;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.8em; /* Slightly larger */
            max-width: 950px;
            line-height: 1.5;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* Grids */
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px; /* More gap */
            margin-top: 30px;
            width: 100%;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-top: 24px;
            width: 100%;
        }


        /* Cards */
        .card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 16px;
            padding: 24px;
            box-sizing: border-box;
            backdrop-filter: blur(12px);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .card:hover {
            border-color: var(--accent-light);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transform: translateY(-2px);
            background: rgba(30, 41, 59, 0.6);
        }

        .card.soft {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.4), rgba(15, 23, 42, 0.4));
            border: 1px solid rgba(59, 130, 246, 0.15);
        }

        .card h4 {
            margin: 0 0 12px 0;
            font-size: 1.1em;
            color: #f8fafc;
            font-weight: 600;
            line-height: 1.3;
        }

        .card p,
        .card li {
            color: var(--muted);
            font-size: 0.85em; /* Larger text */
            line-height: 1.6;
            margin: 0;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-top: 40px;
            width: 100%;
        }

        .stat {
            background: rgba(15, 23, 42, 0.6);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(59, 130, 246, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .stat .num {
            font-size: 2.5em;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 8px;
            background: linear-gradient(to right, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat .label {
            font-size: 0.9em;
            color: #e2e8f0;
            margin-bottom: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat .desc {
            font-size: 0.75em;
            color: var(--muted);
            line-height: 1.4;
            text-align: center;
        }

        /* Embed Box */
        .embed-box {
            margin: 20px auto 0;
            width: 98%;
            height: 55vh; /* Reduced from 65vh to prevent overflow */
            max-height: 600px;
            min-height: 280px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 16px;
            overflow: hidden;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .embed-box svg {
            flex: 1;
            width: auto !important;
            height: auto !important;
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        .embed-box > div {
            flex: 0 0 auto;
            padding: 12px 16px 0;
            width: 100%;
            box-sizing: border-box;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 20px;
            font-size: 0.8em;
            background: rgba(30, 41, 59, 0.3);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        th, td {
            padding: 14px 18px;
            text-align: left;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        th {
            background: rgba(59, 130, 246, 0.1);
            color: #f1f5f9;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.05em;
        }

        tr:last-child td {
            border-bottom: none;
        }

        td {
            color: var(--muted);
        }

        .accent {
            color: var(--accent-light);
            font-weight: 600;
        }

        /* Layout Helpers */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
            margin-top: 30px;
            width: 100%;
        }


        .bullet-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
        }

        .bullet {
            font-size: 0.55em;
            color: var(--muted);
            line-height: 1.4;
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.6), rgba(15, 23, 42, 0.6));
            padding: 12px;
            border-radius: 10px;
            border: 1.5px solid rgba(59, 130, 246, 0.22);
            backdrop-filter: blur(8px);
        }

        .rec-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 16px;
        }

        .rec {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.6), rgba(15, 23, 42, 0.6));
            border: 1.5px solid rgba(59, 130, 246, 0.25);
            border-radius: 11px;
            padding: 14px;
            min-height: 95px;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }

        .rec:hover {
            border-color: rgba(59, 130, 246, 0.4);
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.75), rgba(15, 23, 42, 0.75));
        }

        .rec h4 {
            margin: 0 0 6px 0;
            font-size: 0.72em;
            color: #cbd5e1;
            font-weight: 500;
        }

        .rec p {
            margin: 0;
            font-size: 0.5em;
            color: var(--muted);
            line-height: 1.3;
        }

        .small {
            font-size: 0.52em;
            color: var(--muted);
            line-height: 1.3;
        }
    </style>
</head>

<body>
    <div class="reveal">
        <div class="slides">
            <!-- Slides are loaded dynamically by loader.js -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
    <script src="loader.js"></script>
    <script>
        // Initialize Reveal after slides are loaded
        function initReveal() {
            Reveal.initialize({
                hash: true,
                slideNumber: true,
                transition: "fade",
                backgroundTransition: "fade",
                width: 1920,
                height: 1080,
                margin: 0.04,
                minScale: 0.2,
                maxScale: 2.0
            });
        }

        // Wait a bit to ensure slides are loaded before initializing
        setTimeout(initReveal, 500);
    </script>
</body>

</html>
